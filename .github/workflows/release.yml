name: Rebuild Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to rebuild/upload release assets for
        required: true
        type: string

jobs:
  rebuild-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag exists
        run: |
          set -euo pipefail
          git rev-parse --verify "refs/tags/${{ inputs.tag }}"

      - name: Set up Python for wheel download
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download bundled binaries
        run: |
          set -euo pipefail
          source scripts/release-external-versions.sh
          HYSTERIA_VERSION="$(release_pinned_hysteria_version)"
          TUN2SOCKS_VERSION="$(release_pinned_tun2socks_version)"

          mkdir -p tools
          curl -fsSL "https://github.com/apernet/hysteria/releases/download/app%2F${HYSTERIA_VERSION}/hysteria-linux-amd64" -o tools/hysteria2-linux-amd64
          curl -fsSL "https://github.com/apernet/hysteria/releases/download/app%2F${HYSTERIA_VERSION}/hysteria-linux-arm64" -o tools/hysteria2-linux-arm64
          chmod +x tools/hysteria2-linux-amd64 tools/hysteria2-linux-arm64
          mkdir -p /tmp/t2s-amd64 /tmp/t2s-arm64
          curl -fsSL "https://github.com/xjasonlyu/tun2socks/releases/download/${TUN2SOCKS_VERSION}/tun2socks-linux-amd64.zip" -o /tmp/tun2socks-amd64.zip
          curl -fsSL "https://github.com/xjasonlyu/tun2socks/releases/download/${TUN2SOCKS_VERSION}/tun2socks-linux-arm64.zip" -o /tmp/tun2socks-arm64.zip
          unzip -qo /tmp/tun2socks-amd64.zip -d /tmp/t2s-amd64/
          unzip -qo /tmp/tun2socks-arm64.zip -d /tmp/t2s-arm64/
          cp "$(find /tmp/t2s-amd64/ -maxdepth 1 -type f | head -1)" tools/tun2socks-linux-amd64
          cp "$(find /tmp/t2s-arm64/ -maxdepth 1 -type f | head -1)" tools/tun2socks-linux-arm64
          chmod +x tools/tun2socks-linux-amd64 tools/tun2socks-linux-arm64

      - name: Build repo archive
        run: |
          tar -czf /tmp/vpn-infra.tar.gz \
            --exclude='.git' --exclude='*.pyc' --exclude='__pycache__' \
            --exclude='*/venv/*' --exclude='node_modules' \
            --exclude='*.log' --exclude='.env' \
            -C . .
          mv /tmp/vpn-infra.tar.gz vpn-infra.tar.gz

      - name: Build installer GUI wheel bundle
        run: |
          set -euo pipefail
          WHEEL_BUNDLE_SCHEMA=2
          WHEEL_BUNDLE_BUILDER_DIGEST="$(
            {
              printf '%s\n' "$WHEEL_BUNDLE_SCHEMA"
              cat scripts/release-external-versions.sh
              cat installers/gui/requirements.txt
            } | sha256sum | awk '{print $1}'
          )"
          cat > /tmp/installer-gui-wheel-packages.txt <<'EOF'
          virtualenv
          pip
          EOF
          digest="$(
            {
              printf '%s\n' "$WHEEL_BUNDLE_SCHEMA"
              printf '%s\n' "$WHEEL_BUNDLE_BUILDER_DIGEST"
              cat installers/gui/requirements.txt
              cat /tmp/installer-gui-wheel-packages.txt
            } | sha256sum | awk '{print $1}'
          )"
          {
            echo "schema=${WHEEL_BUNDLE_SCHEMA}"
            echo "generated_at=$(date -u +%FT%TZ)"
            echo "builder_digest=${WHEEL_BUNDLE_BUILDER_DIGEST}"
            echo "pkgset|installer-gui-wheels.tar.gz|${digest}"
          } > installer-gui-wheels-manifest.txt
          mkdir -p /tmp/installer-gui-wheels
          python3 -m pip download \
            --dest /tmp/installer-gui-wheels \
            --only-binary=:all: \
            virtualenv \
            pip \
            -r installers/gui/requirements.txt
          tar -czf installer-gui-wheels.tar.gz -C /tmp/installer-gui-wheels .

      - name: Build Python wheel bundles
        run: |
          set -euo pipefail
          bash scripts/build-python-wheel-bundles.sh \
            --manifest-out python-wheel-bundles-manifest.txt

      - name: Build release assets manifest
        run: |
          set -euo pipefail
          export RELEASE_TAG="${{ inputs.tag }}"
          export RELEASE_COMMIT_SHA="$(git rev-parse HEAD)"
          bash scripts/build-release-assets-manifest.sh release-assets-manifest.txt

      - name: Build Docker image bundles
        run: |
          set -euo pipefail
          bash scripts/build-docker-bundles.sh \
            --manifest-out docker-bundles-manifest.txt

      - name: Build system package bundles
        run: |
          set -euo pipefail
          bash scripts/build-system-package-bundles.sh \
            --manifest-out system-packages-manifest.txt

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          MANIFEST_TMP="$(mktemp -d)"
          if ! gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ inputs.tag }}" \
              --title "${{ inputs.tag }}" \
              --notes "Release assets rebuilt for ${{ inputs.tag }}"
          else
            gh release download "${{ inputs.tag }}" \
              --pattern release-assets-manifest.txt \
              --dir "$MANIFEST_TMP"
            if [[ ! -f "$MANIFEST_TMP/release-assets-manifest.txt" ]]; then
              echo "Existing release ${{ inputs.tag }} is missing release-assets-manifest.txt" >&2
              exit 1
            fi
            grep -Fqx "release_tag=${{ inputs.tag }}" "$MANIFEST_TMP/release-assets-manifest.txt" || {
              echo "Existing release manifest tag mismatch for ${{ inputs.tag }}" >&2
              exit 1
            }
            grep -Fqx "commit_sha=$(git rev-parse HEAD)" "$MANIFEST_TMP/release-assets-manifest.txt" || {
              echo "Existing release manifest commit mismatch for ${{ inputs.tag }}" >&2
              exit 1
            }
          fi

          gh release upload "${{ inputs.tag }}" \
            --clobber \
            install.sh \
            release-assets-manifest.txt \
            installer-gui-wheels.tar.gz \
            installer-gui-wheels-manifest.txt \
            watchdog-wheels.tar.gz \
            telegram-bot-wheels.tar.gz \
            python-wheel-bundles-manifest.txt \
            vpn-infra.tar.gz \
            docker-bundles-manifest.txt \
            system-packages-manifest.txt \
            docker-images.tar.gz \
            docker-images-monitoring.tar.gz \
            docker-images-vps.tar.gz \
            system-packages-home-core.tar.gz \
            system-packages-home-docker.tar.gz \
            system-packages-home-awg.tar.gz \
            system-packages-vps-core.tar.gz \
            system-packages-vps-docker.tar.gz
