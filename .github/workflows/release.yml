name: Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to rebuild/upload release assets for
        required: true
        type: string

jobs:
  rebuild-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag exists
        run: |
          git rev-parse --verify "refs/tags/${{ inputs.tag }}"

      - name: Build repo archive
        run: |
          tar -czf /tmp/vpn-infra.tar.gz \
            --exclude='.git' --exclude='*.pyc' --exclude='__pycache__' \
            --exclude='*/venv/*' --exclude='node_modules' \
            --exclude='*.log' --exclude='.env' \
            -C . .
          mv /tmp/vpn-infra.tar.gz vpn-infra.tar.gz
          echo "Размер архива: $(du -sh vpn-infra.tar.gz | cut -f1)"

      - name: Build installer GUI wheel bundle
        run: |
          set -euo pipefail
          cat > /tmp/installer-gui-wheel-packages.txt <<'EOF'
          virtualenv
          pip
          EOF
          digest="$(
            {
              cat installers/gui/requirements.txt
              cat /tmp/installer-gui-wheel-packages.txt
            } | sha256sum | awk '{print $1}'
          )"
          {
            echo "schema=1"
            echo "generated_at=$(date -u +%FT%TZ)"
            echo "pkgset|installer-gui-wheels.tar.gz|${digest}"
          } > installer-gui-wheels-manifest.txt
          mkdir -p /tmp/installer-gui-wheels
          python3 -m pip download \
            --dest /tmp/installer-gui-wheels \
            --only-binary=:all: \
            virtualenv \
            pip \
            -r installers/gui/requirements.txt
          tar -czf installer-gui-wheels.tar.gz -C /tmp/installer-gui-wheels .

      - name: Build Docker image bundles
        run: |
          set -euo pipefail
          bash scripts/build-docker-bundles.sh \
            --manifest-out docker-bundles-manifest.txt

      - name: Build system package bundles
        run: |
          set -euo pipefail
          bash scripts/build-system-package-bundles.sh \
            --manifest-out system-packages-manifest.txt

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            --clobber \
            installer-gui-wheels.tar.gz \
            installer-gui-wheels-manifest.txt \
            vpn-infra.tar.gz \
            docker-bundles-manifest.txt \
            system-packages-manifest.txt \
            docker-images.tar.gz \
            docker-images-monitoring.tar.gz \
            docker-images-vps.tar.gz \
            system-packages-home-core.tar.gz \
            system-packages-home-docker.tar.gz \
            system-packages-home-awg.tar.gz \
            system-packages-vps-core.tar.gz \
            system-packages-vps-docker.tar.gz
