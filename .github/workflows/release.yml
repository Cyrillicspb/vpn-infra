name: Release

# Этот воркфлоу срабатывает только при ручном создании тега (git tag vX.Y.Z.W + git push --tags).
# При обычных пушах в master релизы создаёт auto-release.yml.

on:
  push:
    tags:
      - "v*"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if tag was created by Auto Release
        run: |
          echo "Tag push detected: ${{ github.ref }}"
          echo "Auto Release создаёт релиз самостоятельно. Этот воркфлоу не делает дублирующих действий."
