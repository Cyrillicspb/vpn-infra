name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Читать версию и changelog
        id: meta
        run: |
          VERSION=$(cat version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Извлечь секцию текущего релиза из CHANGELOG.md
          awk "/^## \[v$VERSION\]/{found=1; next} found && /^## \[v/{exit} found{print}" CHANGELOG.md > release_notes.md
          echo "Файл release_notes.md:"
          cat release_notes.md

      - name: Скачать бинарники для бандла
        run: |
          HYSTERIA_VERSION="v2.5.1"
          TUN2SOCKS_VERSION="v2.5.2"
          mkdir -p tools

          echo "Загрузка hysteria2 ${HYSTERIA_VERSION}..."
          curl -fsSL "https://github.com/apernet/hysteria/releases/download/app%2F${HYSTERIA_VERSION}/hysteria-linux-amd64" \
            -o tools/hysteria2-linux-amd64
          curl -fsSL "https://github.com/apernet/hysteria/releases/download/app%2F${HYSTERIA_VERSION}/hysteria-linux-arm64" \
            -o tools/hysteria2-linux-arm64
          chmod +x tools/hysteria2-linux-amd64 tools/hysteria2-linux-arm64

          echo "Загрузка tun2socks ${TUN2SOCKS_VERSION}..."
          curl -fsSL "https://github.com/xjasonlyu/tun2socks/releases/download/${TUN2SOCKS_VERSION}/tun2socks-linux-amd64.zip" \
            -o /tmp/tun2socks-amd64.zip
          curl -fsSL "https://github.com/xjasonlyu/tun2socks/releases/download/${TUN2SOCKS_VERSION}/tun2socks-linux-arm64.zip" \
            -o /tmp/tun2socks-arm64.zip
          cd /tmp && unzip -qo tun2socks-amd64.zip && mv tun2socks-linux-amd64 $GITHUB_WORKSPACE/tools/
          cd /tmp && unzip -qo tun2socks-arm64.zip && mv tun2socks-linux-arm64 $GITHUB_WORKSPACE/tools/
          chmod +x $GITHUB_WORKSPACE/tools/tun2socks-linux-amd64 $GITHUB_WORKSPACE/tools/tun2socks-linux-arm64

          echo "Содержимое tools/:"
          ls -lh tools/

      - name: Собрать архив репозитория
        run: |
          # Пишем в /tmp чтобы избежать "file changed as we read it"
          tar -czf /tmp/vpn-infra.tar.gz \
            --exclude='.git' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='*/venv/*' \
            --exclude='node_modules' \
            --exclude='*.log' \
            --exclude='.env' \
            -C . .
          mv /tmp/vpn-infra.tar.gz vpn-infra.tar.gz
          echo "Размер архива: $(du -sh vpn-infra.tar.gz | cut -f1)"

      - name: Создать GitHub Release с установщиками
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.meta.outputs.version }}"
          body_path: release_notes.md
          files: |
            installers/windows/install-windows.bat
            installers/macos/install-macos.command
            installers/linux/install-linux.sh
            vpn-infra.tar.gz
