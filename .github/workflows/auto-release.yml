name: Auto Release

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.claude/**'

concurrency:
  group: auto-release-master
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: version
        run: |
          CURRENT=$(cat version | tr -d '[:space:]')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT"

      - name: Increment patch version
        id: next
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          # Format: 0.3.2.1 → 0.3.2.2 (last segment increments, no upper limit)
          PREFIX=$(echo "$CURRENT" | rev | cut -d. -f2- | rev)
          PATCH=$(echo "$CURRENT" | rev | cut -d. -f1 | rev)
          NEXT_PATCH=$((PATCH + 1))
          NEXT="${PREFIX}.${NEXT_PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${GITHUB_SHA}" --pretty=format:"- %s" --no-merges)
          else
            NOTES="Initial release"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Python for wheel download
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download bundled binaries
        run: |
          set -euo pipefail
          HYSTERIA_VERSION=$(curl -sSfL --max-time 10 \
            https://api.github.com/repos/apernet/hysteria/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].replace('app/',''))" \
            2>/dev/null) || HYSTERIA_VERSION="v2.7.1"
          [[ -z "$HYSTERIA_VERSION" ]] && HYSTERIA_VERSION="v2.7.1"

          TUN2SOCKS_VERSION=$(curl -sSfL --max-time 10 \
            https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])" \
            2>/dev/null) || TUN2SOCKS_VERSION="v2.5.2"
          [[ -z "$TUN2SOCKS_VERSION" ]] && TUN2SOCKS_VERSION="v2.5.2"

          echo "hysteria2: ${HYSTERIA_VERSION}, tun2socks: ${TUN2SOCKS_VERSION}"
          mkdir -p tools

          curl -fsSL "https://github.com/apernet/hysteria/releases/download/app%2F${HYSTERIA_VERSION}/hysteria-linux-amd64" \
            -o tools/hysteria2-linux-amd64
          curl -fsSL "https://github.com/apernet/hysteria/releases/download/app%2F${HYSTERIA_VERSION}/hysteria-linux-arm64" \
            -o tools/hysteria2-linux-arm64
          chmod +x tools/hysteria2-linux-amd64 tools/hysteria2-linux-arm64

          mkdir -p /tmp/t2s-amd64 /tmp/t2s-arm64
          curl -fsSL "https://github.com/xjasonlyu/tun2socks/releases/download/${TUN2SOCKS_VERSION}/tun2socks-linux-amd64.zip" \
            -o /tmp/tun2socks-amd64.zip
          curl -fsSL "https://github.com/xjasonlyu/tun2socks/releases/download/${TUN2SOCKS_VERSION}/tun2socks-linux-arm64.zip" \
            -o /tmp/tun2socks-arm64.zip
          unzip -qo /tmp/tun2socks-amd64.zip -d /tmp/t2s-amd64/
          unzip -qo /tmp/tun2socks-arm64.zip -d /tmp/t2s-arm64/
          cp "$(find /tmp/t2s-amd64/ -maxdepth 1 -type f | head -1)" tools/tun2socks-linux-amd64
          cp "$(find /tmp/t2s-arm64/ -maxdepth 1 -type f | head -1)" tools/tun2socks-linux-arm64
          chmod +x tools/tun2socks-linux-amd64 tools/tun2socks-linux-arm64
          ls -lh tools/

      - name: Build installer GUI wheel bundle
        run: |
          set -euo pipefail
          mkdir -p /tmp/installer-gui-wheels
          python3 -m pip download \
            --dest /tmp/installer-gui-wheels \
            --only-binary=:all: \
            virtualenv \
            pip \
            -r installers/gui/requirements.txt
          tar -czf installer-gui-wheels.tar.gz -C /tmp/installer-gui-wheels .
          echo "Размер wheel bundle: $(du -sh installer-gui-wheels.tar.gz | cut -f1)"

      - name: Build repo archive
        run: |
          tar -czf /tmp/vpn-infra.tar.gz \
            --exclude='.git' --exclude='*.pyc' --exclude='__pycache__' \
            --exclude='*/venv/*' --exclude='node_modules' \
            --exclude='*.log' --exclude='.env' \
            -C . .
          mv /tmp/vpn-infra.tar.gz vpn-infra.tar.gz
          echo "Размер архива: $(du -sh vpn-infra.tar.gz | cut -f1)"

      - name: Resolve Docker bundle manifest
        run: |
          set -euo pipefail
          bash scripts/build-docker-bundles.sh \
            --manifest-out docker-bundles-manifest.txt \
            --manifest-only

      - name: Plan Docker bundle reuse
        id: docker_plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source scripts/docker-image-groups.sh

          PREV_TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 | awk '{print $1}' | head -1 || true)"
          PREV_MANIFEST=""
          if [[ -n "$PREV_TAG" ]]; then
            mkdir -p /tmp/prev-release
            if gh release download "$PREV_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern docker-bundles-manifest.txt \
              --dir /tmp/prev-release 2>/dev/null; then
              PREV_MANIFEST="/tmp/prev-release/docker-bundles-manifest.txt"
            fi
          fi

          build_groups=()
          reuse_groups=()
          while IFS= read -r group; do
            current_digest="$(awk -F'|' -v g="$group" '$1=="group" && $2==g {print $4}' docker-bundles-manifest.txt)"
            prev_digest=""
            if [[ -n "$PREV_MANIFEST" ]]; then
              prev_digest="$(awk -F'|' -v g="$group" '$1=="group" && $2==g {print $4}' "$PREV_MANIFEST")"
            fi

            if [[ -n "$PREV_TAG" && -n "$prev_digest" && "$prev_digest" == "$current_digest" ]]; then
              reuse_groups+=("$group")
            else
              build_groups+=("$group")
            fi
          done < <(docker_image_bundle_groups)

          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "build_groups=$(IFS=,; echo "${build_groups[*]}")" >> "$GITHUB_OUTPUT"
          echo "reuse_groups=$(IFS=,; echo "${reuse_groups[*]}")" >> "$GITHUB_OUTPUT"
          echo "Build groups: ${build_groups[*]:-(none)}"
          echo "Reuse groups: ${reuse_groups[*]:-(none)}"

      - name: Build changed Docker bundles
        if: steps.docker_plan.outputs.build_groups != ''
        run: |
          set -euo pipefail
          bash scripts/build-docker-bundles.sh \
            --manifest-out docker-bundles-manifest.txt \
            --no-pull \
            --build-groups "${{ steps.docker_plan.outputs.build_groups }}"

      - name: Reuse unchanged Docker bundles
        if: steps.docker_plan.outputs.reuse_groups != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source scripts/docker-image-groups.sh

          fallback_groups=()
          IFS=',' read -r -a reuse_groups <<< "${{ steps.docker_plan.outputs.reuse_groups }}"
          for group in "${reuse_groups[@]}"; do
            [[ -n "$group" ]] || continue
            asset="$(docker_image_bundle_asset_name "$group")"
            if gh release download "${{ steps.docker_plan.outputs.prev_tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$asset" \
              --dir .; then
              echo "Reused $asset from ${{ steps.docker_plan.outputs.prev_tag }}"
            else
              echo "Reuse failed for $asset; rebuilding locally"
              fallback_groups+=("$group")
            fi
          done

          if (( ${#fallback_groups[@]} > 0 )); then
            bash scripts/build-docker-bundles.sh \
              --manifest-out docker-bundles-manifest.txt \
              --no-pull \
              --build-groups "$(IFS=,; echo "${fallback_groups[*]}")"
          fi

      - name: Verify release assets
        run: |
          set -euo pipefail
          source scripts/docker-image-groups.sh
          [[ -f installer-gui-wheels.tar.gz ]]
          [[ -f vpn-infra.tar.gz ]]
          [[ -f docker-bundles-manifest.txt ]]
          while IFS= read -r group; do
            asset="$(docker_image_bundle_asset_name "$group")"
            [[ -f "$asset" ]] || { echo "Missing release asset: $asset" >&2; exit 1; }
          done < <(docker_image_bundle_groups)

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.next.outputs.next }}"
          echo "$NEXT" > version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "chore: bump version to $NEXT"
          git tag "v$NEXT"
          git push origin HEAD:master "v$NEXT"
          gh release create "v$NEXT" \
            --title "v$NEXT" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --latest \
            installer-gui-wheels.tar.gz \
            vpn-infra.tar.gz \
            docker-bundles-manifest.txt \
            docker-images.tar.gz \
            docker-images-monitoring.tar.gz \
            docker-images-vps.tar.gz

      - name: Delete old Docker bundle assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: v${{ steps.next.outputs.next }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > /tmp/releases.json
          python3 - <<'PY' > /tmp/stale-assets.txt
import json
import os

current_tag = os.environ["CURRENT_TAG"]
target_names = {
    "installer-gui-wheels.tar.gz",
    "docker-images.tar.gz",
    "docker-images-monitoring.tar.gz",
    "docker-images-vps.tar.gz",
}

with open("/tmp/releases.json", "r", encoding="utf-8") as fh:
    releases = json.load(fh)

for release in releases:
    if release["tag_name"] == current_tag:
        continue
    for asset in release.get("assets", []):
        if asset["name"] in target_names:
            print(f'{release["tag_name"]}|{asset["id"]}|{asset["name"]}')
PY

          while IFS='|' read -r tag asset_id asset_name; do
            [[ -n "$asset_id" ]] || continue
            echo "Delete old asset: ${tag} ${asset_name}"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
          done < /tmp/stale-assets.txt
