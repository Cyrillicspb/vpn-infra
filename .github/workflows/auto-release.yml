name: Auto Release

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.claude/**'

concurrency:
  group: auto-release-master
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: version
        run: |
          CURRENT=$(cat version | tr -d '[:space:]')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT"

      - name: Increment patch version
        id: next
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          # Format: 0.3.2.1 → 0.3.2.2 (last segment increments, no upper limit)
          PREFIX=$(echo "$CURRENT" | rev | cut -d. -f2- | rev)
          PATCH=$(echo "$CURRENT" | rev | cut -d. -f1 | rev)
          NEXT_PATCH=$((PATCH + 1))
          NEXT="${PREFIX}.${NEXT_PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${GITHUB_SHA}" --pretty=format:"- %s" --no-merges)
          else
            NOTES="Initial release"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Python for wheel download
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download bundled binaries
        run: |
          set -euo pipefail
          HYSTERIA_VERSION=$(curl -sSfL --max-time 10 \
            https://api.github.com/repos/apernet/hysteria/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].replace('app/',''))" \
            2>/dev/null) || HYSTERIA_VERSION="v2.7.1"
          [[ -z "$HYSTERIA_VERSION" ]] && HYSTERIA_VERSION="v2.7.1"

          TUN2SOCKS_VERSION=$(curl -sSfL --max-time 10 \
            https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])" \
            2>/dev/null) || TUN2SOCKS_VERSION="v2.5.2"
          [[ -z "$TUN2SOCKS_VERSION" ]] && TUN2SOCKS_VERSION="v2.5.2"

          echo "hysteria2: ${HYSTERIA_VERSION}, tun2socks: ${TUN2SOCKS_VERSION}"
          mkdir -p tools

          curl -fsSL "https://github.com/apernet/hysteria/releases/download/app%2F${HYSTERIA_VERSION}/hysteria-linux-amd64" \
            -o tools/hysteria2-linux-amd64
          curl -fsSL "https://github.com/apernet/hysteria/releases/download/app%2F${HYSTERIA_VERSION}/hysteria-linux-arm64" \
            -o tools/hysteria2-linux-arm64
          chmod +x tools/hysteria2-linux-amd64 tools/hysteria2-linux-arm64

          mkdir -p /tmp/t2s-amd64 /tmp/t2s-arm64
          curl -fsSL "https://github.com/xjasonlyu/tun2socks/releases/download/${TUN2SOCKS_VERSION}/tun2socks-linux-amd64.zip" \
            -o /tmp/tun2socks-amd64.zip
          curl -fsSL "https://github.com/xjasonlyu/tun2socks/releases/download/${TUN2SOCKS_VERSION}/tun2socks-linux-arm64.zip" \
            -o /tmp/tun2socks-arm64.zip
          unzip -qo /tmp/tun2socks-amd64.zip -d /tmp/t2s-amd64/
          unzip -qo /tmp/tun2socks-arm64.zip -d /tmp/t2s-arm64/
          cp "$(find /tmp/t2s-amd64/ -maxdepth 1 -type f | head -1)" tools/tun2socks-linux-amd64
          cp "$(find /tmp/t2s-arm64/ -maxdepth 1 -type f | head -1)" tools/tun2socks-linux-arm64
          chmod +x tools/tun2socks-linux-amd64 tools/tun2socks-linux-arm64
          ls -lh tools/

      - name: Build repo archive
        run: |
          tar -czf /tmp/vpn-infra.tar.gz \
            --exclude='.git' --exclude='*.pyc' --exclude='__pycache__' \
            --exclude='*/venv/*' --exclude='node_modules' \
            --exclude='*.log' --exclude='.env' \
            -C . .
          mv /tmp/vpn-infra.tar.gz vpn-infra.tar.gz
          echo "Размер архива: $(du -sh vpn-infra.tar.gz | cut -f1)"

      - name: Build Docker image bundles
        run: |
          set -euo pipefail
          source scripts/docker-image-groups.sh

          mkdir -p docker-images
          mapfile -t ALL_IMAGES < <(docker_image_group_names all)
          for img in "${ALL_IMAGES[@]}"; do
            fname="$(docker_image_to_archive_name "$img")"
            echo "Pull: $img"
            docker pull "$img"
            echo "Save: docker-images/${fname}"
            docker save "$img" | gzip > "docker-images/${fname}"
            ls -lh "docker-images/${fname}"
          done

          while IFS= read -r group; do
            archive="$(docker_image_bundle_asset_name "$group")"
            members=()
            while IFS= read -r img; do
              members+=("docker-images/$(docker_image_to_archive_name "$img")")
            done < <(docker_image_group_names "$group")
            tar -czf "$archive" "${members[@]}"
            echo "Bundle ${archive}: $(du -sh "$archive" | cut -f1)"
          done < <(docker_image_bundle_groups)

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.next.outputs.next }}"
          echo "$NEXT" > version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "chore: bump version to $NEXT"
          git tag "v$NEXT"
          git push origin HEAD:master "v$NEXT"
          gh release create "v$NEXT" \
            --title "v$NEXT" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --latest \
            vpn-infra.tar.gz \
            docker-images.tar.gz \
            docker-images-monitoring.tar.gz \
            docker-images-vps.tar.gz
