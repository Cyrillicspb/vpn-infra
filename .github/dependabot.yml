version: 2
updates:
  # Docker base images — only security patches
  - package-ecosystem: "docker"
    directory: "/home/telegram-bot"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      # Block major/minor upgrades, allow only patch
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "docker"
    directory: "/vps"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # GitHub Actions — keep CI up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
