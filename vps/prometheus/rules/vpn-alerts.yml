groups:
  - name: vpn-alerts
    interval: 30s
    rules:
      # Домашний сервер недоступен
      - alert: HomeServerDown
        expr: up{job="home-node"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Домашний сервер недоступен"
          description: "Нет данных от home-node более 2 минут"

      # Высокая нагрузка CPU
      - alert: HighCPU
        expr: 100 - (avg by(instance)(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Высокая нагрузка CPU на {{ $labels.instance }}"
          description: "CPU > 85% в течение 10 минут"

      # Мало места на диске
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Мало места на диске: {{ $labels.instance }}"
          description: "Свободно менее 20%"

      # Критически мало места
      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Критически мало места: {{ $labels.instance }}"

      # Высокое потребление RAM
      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокое потребление RAM: {{ $labels.instance }}"
