# prometheus.yml — VPS
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # VPS сам (node-exporter)
  - job_name: 'vps-node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'vps'

  # Домашний сервер через туннель
  - job_name: 'home-node'
    static_configs:
      - targets: ['10.177.2.1:9100']
        labels:
          instance: 'home'

  # Watchdog метрики
  - job_name: 'watchdog'
    static_configs:
      - targets: ['10.177.2.1:8080']
        labels:
          instance: 'home'
    metrics_path: '/metrics'
