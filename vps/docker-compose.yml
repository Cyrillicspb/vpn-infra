# docker-compose.yml — VPS
# Запуск: docker compose up -d
#
# Архитектура:
#   3x-ui (network_mode: host) — Xray с REALITY + gRPC + fallback → Nginx
#   nginx — mTLS reverse proxy на :8443 + Prometheus/Grafana за reverse proxy
#   cloudflared — CDN-стек (tunnel к Cloudflare)
#   prometheus — pull метрики домашнего сервера через туннель
#   alertmanager — правила алертов → Telegram
#   grafana — дашборды, Render API для /graph в боте
#   node-exporter — метрики самого VPS
#
# Сеть: vps-net 172.21.0.0/24
# 3x-ui и cloudflared: network_mode: host (требуют bind на 0.0.0.0)
# node-exporter: network_mode: host (нужен доступ к метрикам хоста)

networks:
  vps-net:
    name: vps-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
    driver_opts:
      com.docker.network.bridge.name: br-vps

services:

  # ── 3x-ui (Xray панель + сервер) ─────────────────────────────────────────────
  # network_mode: host — Xray биндит 443/TCP (REALITY), 443/UDP (Hysteria2)
  # Панель доступна через Nginx :8443 с mTLS
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3x-ui
    restart: always
    network_mode: host
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
    volumes:
      - ./3x-ui/db:/etc/x-ui
      - ./nginx/mtls:/etc/x-ui/mtls:ro
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2053/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx — mTLS + reverse proxy для панелей ──────────────────────────────────
  # :8443 → 3x-ui панель (mTLS клиентский сертификат)
  # Prometheus/Grafana за reverse proxy (без прямого внешнего доступа)
  nginx:
    image: nginx:1.25.4-alpine
    container_name: nginx
    restart: always
    ports:
      - "8443:8443"
      - "10.177.2.1:9000:9000"   # Grafana через VPN, только с tier2 интерфейса
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/mtls:/etc/nginx/mtls:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      vps-net:
        ipv4_address: 172.21.0.10
    depends_on:
      - 3x-ui
      - grafana
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Cloudflared (CDN-стек, серверная сторона) ─────────────────────────────────
  # Создаёт Cloudflare Tunnel → проксирует к Xray localhost
  # network_mode: host — тоннель к localhost Xray
  cloudflared:
    image: cloudflare/cloudflared:2024.5.0
    container_name: cloudflared
    restart: always
    command: tunnel run --token ${CF_TUNNEL_TOKEN}
    network_mode: host
    env_file: .env
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Prometheus ────────────────────────────────────────────────────────────────
  # Pull-метрики: домашний сервер (node-exporter + watchdog) через туннель
  # Слушает только на 127.0.0.1:9090 — доступ через Nginx reverse proxy
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: always
    user: "65534:65534"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/watchdog-token:/etc/prometheus/watchdog-token:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
      - "--web.listen-address=0.0.0.0:9090"
      - "--web.external-url=http://localhost:9090"
      - "--web.enable-lifecycle"
    networks:
      vps-net:
        ipv4_address: 172.21.0.11
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Alertmanager ──────────────────────────────────────────────────────────────
  # Правила алертов → Telegram (через Prometheus alerting rules)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: always
    user: "65534:65534"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/watchdog-token:/etc/alertmanager/watchdog-token:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=0.0.0.0:9093"
    networks:
      vps-net:
        ipv4_address: 172.21.0.12
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana ───────────────────────────────────────────────────────────────────
  # Дашборды + Render API (watchdog /graph → PNG → Telegram)
  # Доступна через Nginx reverse proxy (не напрямую снаружи)
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: always
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
      GF_SERVER_HTTP_PORT: "3000"
      GF_RENDERING_SERVER_URL: "http://grafana-renderer:8081/render"
      GF_RENDERING_CALLBACK_URL: "http://grafana:3000/"
      GF_LOG_LEVEL: "warn"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      vps-net:
        ipv4_address: 172.21.0.13
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana Image Renderer (для /graph PNG в боте) ────────────────────────────
  grafana-renderer:
    image: grafana/grafana-image-renderer:3.10.1
    container_name: grafana-renderer
    restart: always
    environment:
      ENABLE_METRICS: "true"
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8081"
    networks:
      vps-net:
        ipv4_address: 172.21.0.14
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Node Exporter — метрики VPS ───────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: always
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - /:/host:ro,rslave
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Hysteria2 (QUIC + Salamander obfs) — UDP 443 ─────────────────────────────
  # Отдельный бинарник, не Xray. Сертификат: self-signed в ./hysteria2/
  # Настройка: HYSTERIA2_AUTH, HYSTERIA2_OBFS_PASSWORD в .env → server.yaml
  hysteria2:
    image: tobyxdd/hysteria:v2.6.1
    container_name: hysteria2
    restart: always
    command: server --config /etc/hysteria2/server.yaml
    volumes:
      - ./hysteria2:/etc/hysteria2:ro
    network_mode: host
    healthcheck:
      test: ["CMD", "sh", "-c", "ss -ulnp | grep :443"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus_data:
    name: vps_prometheus_data
  alertmanager_data:
    name: vps_alertmanager_data
  grafana_data:
    name: vps_grafana_data
