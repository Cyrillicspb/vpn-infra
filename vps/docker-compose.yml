# docker-compose.yml — VPS
# Запуск: docker compose up -d
#
# Архитектура:
#   3x-ui (network_mode: host) — Xray с REALITY + gRPC + fallback → Nginx
#   nginx — mTLS reverse proxy на :8443 (3x-ui панель)
#   cloudflared — CDN-стек (tunnel к Cloudflare)
#   node-exporter — метрики VPS (scrape с домашнего Prometheus через tier2)
#   hysteria2 — QUIC+Salamander UDP 443
#
# Мониторинг (Prometheus, Alertmanager, Grafana) перенесён на домашний сервер.
#
# Сеть: vps-net 172.21.0.0/24
# 3x-ui, cloudflared, node-exporter, hysteria2: network_mode: host

networks:
  vps-net:
    name: vps-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
    driver_opts:
      com.docker.network.bridge.name: br-vps

services:

  # ── 3x-ui (Xray панель + сервер) ─────────────────────────────────────────────
  # network_mode: host — Xray биндит 443/TCP (REALITY), 443/UDP (Hysteria2)
  # Панель доступна через Nginx :8443 с mTLS
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3x-ui
    restart: always
    network_mode: host
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
    volumes:
      - ./3x-ui/db:/etc/x-ui
      - ./nginx/mtls:/etc/x-ui/mtls:ro
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2053/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx — mTLS + reverse proxy для 3x-ui панели ────────────────────────────
  # :8443 → 3x-ui панель (mTLS клиентский сертификат)
  # :80   → health check
  nginx:
    image: nginx:1.25.4-alpine
    container_name: nginx
    restart: always
    ports:
      - "8443:8443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/mtls:/etc/nginx/mtls:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      vps-net:
        ipv4_address: 172.21.0.10
    depends_on:
      - 3x-ui
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Cloudflared (CDN-стек, серверная сторона) ─────────────────────────────────
  # Создаёт Cloudflare Tunnel → проксирует к Xray localhost
  # network_mode: host — тоннель к localhost Xray
  cloudflared:
    image: cloudflare/cloudflared:2024.5.0
    container_name: cloudflared
    restart: on-failure
    # entrypoint override: образ имеет ENTRYPOINT ["cloudflared","--no-autoupdate"],
    # Docker прибавляет command к entrypoint → "cloudflared sh -c ..." → ошибка.
    # Переопределяем entrypoint на sh чтобы command выполнялся как shell-скрипт.
    # CF_TUNNEL_TOKEN не используется в конфигурации CDN через Workers (CF_CDN_HOSTNAME).
    # Если токен не задан — контейнер остаётся Up (sleep infinity), не падает.
    entrypoint: ["/bin/sh"]
    command: >
      -c 'if [ -z "$$CF_TUNNEL_TOKEN" ]; then
        echo "CF_TUNNEL_TOKEN not set — cloudflared named tunnel disabled (CDN via Workers)";
        exec sleep infinity;
      fi;
      exec cloudflared --no-autoupdate tunnel run --token "$$CF_TUNNEL_TOKEN"'
    network_mode: host
    env_file: .env
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Node Exporter — метрики VPS ───────────────────────────────────────────────
  # Scrape с домашнего Prometheus через tier2 туннель (10.177.2.2:9100)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: always
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - /:/host:ro,rslave
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── iperf3 — сервер для замера скорости до VPS (только tier-2) ───────────────
  # Слушает только на 10.177.2.2 (tier-2 интерфейс) → недоступен из интернета
  # Используется watchdog /assess для базовой линии скорости
  iperf3:
    image: networkstatic/iperf3:latest
    container_name: iperf3
    restart: always
    network_mode: host
    command: ["-s", "--bind", "10.177.2.2", "-p", "5201"]
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Hysteria2 (QUIC + Salamander obfs) — UDP 443 ─────────────────────────────
  # Отдельный бинарник, не Xray. Сертификат: self-signed в ./hysteria2/
  # Настройка: HYSTERIA2_AUTH, HYSTERIA2_OBFS_PASSWORD в .env → server.yaml
  hysteria2:
    image: tobyxdd/hysteria:v2.6.1
    container_name: hysteria2
    restart: always
    command: server --config /etc/hysteria2/server.yaml
    volumes:
      - ./hysteria2:/etc/hysteria2:ro
    network_mode: host
    healthcheck:
      test: ["CMD", "sh", "-c", "hysteria version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
