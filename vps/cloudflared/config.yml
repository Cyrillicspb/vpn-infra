# cloudflared config — VPS (серверная сторона CDN-стека)
# =============================================================================
# CDN-стек использует Cloudflare Workers (CF_CDN_HOSTNAME) как relay.
# cloudflared tunnel на VPS НЕ требуется — Workers проксируют трафик
# напрямую к Xray WS inbound (localhost:8080).
#
# Архитектура CDN-стека:
#   Cloudflare CDN
#     → cloudflared tunnel (VPS, этот сервис)
#       → Xray VLESS+WebSocket inbound (localhost:8080, path /vpn)
#         ← клиент: cloudflared access → Xray client → tun2socks
#
# Xray WS inbound настраивается в 3x-ui:
#   Protocol: VLESS, Network: ws, Security: none
#   Listen: 127.0.0.1, Port: 8080, Path: /vpn
#   UUID: $XRAY_UUID (тот же что для REALITY)
#
# Для --token режима ingress-правила в Dashboard:
#   Hostname: <your-domain.com>   →   http://localhost:8080
# =============================================================================

# Метрики cloudflared (Prometheus scrape)
metrics: 127.0.0.1:20241

# Логирование
loglevel: info

# Fallback: если Xray WS недоступен → HTTP 503
# (используется только если config.yml управляет ingress, не Dashboard)
ingress:
  # CDN-трафик → Xray VLESS+WS (без TLS, TLS терминируется Cloudflare)
  - hostname: ""       # задаётся в Cloudflare Dashboard при использовании token
    service: http://localhost:8080

  # Обязательный fallback
  - service: http_status:404
