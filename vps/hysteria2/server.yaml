# Hysteria2 server config — VPS
# Генерируется setup.sh из .env (HYSTERIA2_AUTH, HYSTERIA2_OBFS_PASSWORD)
# TLS: self-signed cert генерируется setup.sh (openssl) → server.crt / server.key

listen: :443

tls:
  cert: /etc/hysteria2/server.crt
  key: /etc/hysteria2/server.key

obfs:
  type: salamander
  salamander:
    password: YOUR_HYSTERIA2_OBFS_PASSWORD

auth:
  type: password
  password: YOUR_HYSTERIA2_AUTH

bandwidth:
  up: 200 mbps
  down: 200 mbps

quic:
  keepAlivePeriod: 20s
  maxIdleTimeout: 60s
  maxIncomingStreams: 1024

masquerade:
  type: proxy
  proxy:
    url: https://www.microsoft.com
    rewriteHost: true

log:
  level: warn
