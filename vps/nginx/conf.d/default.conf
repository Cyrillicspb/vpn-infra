# nginx/conf.d/default.conf — VPS
# =============================================================================
# Порты:
#   :80  — health check (для Docker healthcheck и мониторинга)
#   :8443 — mTLS: Grafana, Prometheus, 3x-ui панель
#
# Порт 443 — занят 3x-ui/Xray (REALITY + Hysteria2 UDP)
#
# mTLS: клиентский сертификат от нашего CA (/etc/nginx/mtls/ca.crt)
# Сертификат сервера: Let's Encrypt или self-signed (/etc/nginx/ssl/)
#
# Сертификаты генерируются install-vps.sh:
#   CA:     /etc/nginx/mtls/ca.{crt,key}   (4096 bit, TTL 10 лет)
#   Сервер: /etc/nginx/ssl/server.{crt,key} (Let's Encrypt или self-signed)
#   Клиент: /etc/nginx/mtls/client.{crt,key} (TTL 2 года) — для sysadmin
# =============================================================================

# ── Upstream-сервисы (docker bridge 172.21.0.0/24) ───────────────────────────

upstream grafana {
    server 172.21.0.13:3000;
    keepalive 16;
}

upstream prometheus {
    server 172.21.0.11:9090;
    keepalive 8;
}

upstream alertmanager {
    server 172.21.0.12:9093;
    keepalive 4;
}

# 3x-ui панель (host network → localhost:2053)
upstream xui_panel {
    server 127.0.0.1:2053;
    keepalive 4;
}

# ── Port 80: только health check ─────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Docker healthcheck endpoint
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Всё остальное → отказ
    location / {
        return 444;
    }
}

# ── Port 8443: mTLS admin panel ───────────────────────────────────────────────
server {
    listen 8443 ssl;
    server_name _;

    # ── TLS ────────────────────────────────────────────────────────────────────
    ssl_certificate        /etc/nginx/ssl/server.crt;
    ssl_certificate_key    /etc/nginx/ssl/server.key;
    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_ciphers            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout    1d;
    ssl_session_cache      shared:MozSSL:10m;
    ssl_session_tickets    off;

    # ── mTLS: требовать клиентский сертификат от нашего CA ────────────────────
    ssl_client_certificate /etc/nginx/mtls/ca.crt;
    ssl_verify_client      on;          # on = обязательно, optional = по желанию
    ssl_verify_depth       2;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # ── Common proxy settings ──────────────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_read_timeout  300s;
    proxy_connect_timeout 10s;

    # ── Grafana ────────────────────────────────────────────────────────────────
    # Grafana Image Renderer работает без суффикса пути через root_url
    location /grafana/ {
        proxy_pass http://grafana/;

        # WebSocket (live updates, alerts panel)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Grafana sub_path support
        rewrite ^/grafana/(.*) /$1 break;
    }

    # ── Prometheus ─────────────────────────────────────────────────────────────
    location /prometheus/ {
        proxy_pass http://prometheus/;

        # Prometheus strips prefix via --web.external-url
        rewrite ^/prometheus/(.*) /$1 break;
    }

    # ── Alertmanager ───────────────────────────────────────────────────────────
    location /alertmanager/ {
        proxy_pass http://alertmanager/;

        rewrite ^/alertmanager/(.*) /$1 break;
    }

    # ── 3x-ui панель ──────────────────────────────────────────────────────────
    location /xui/ {
        proxy_pass http://xui_panel/;

        # WebSocket для 3x-ui live stats
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        rewrite ^/xui/(.*) /$1 break;
    }

    # ── Health check (без mTLS, для мониторинга панели) ───────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Deny all ───────────────────────────────────────────────────────────────
    location / {
        return 403 "mTLS required\n";
    }

    # ── Логи ───────────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/admin_access.log;
    error_log   /var/log/nginx/admin_error.log warn;
}
