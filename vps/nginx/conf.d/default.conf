# Nginx — VPS
# mTLS + реверс-прокси для 3x-ui панели

# Grafana через nginx
upstream grafana {
    server 172.21.0.0:3000;
}

# Prometheus через nginx
upstream prometheus {
    server 127.0.0.1:9090;
}

# Fallback сервер для REALITY (при неверном SNI)
server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # mTLS для управления
    ssl_client_certificate /etc/nginx/mtls/ca.crt;
    ssl_verify_client optional;

    # Grafana (только с mTLS)
    location /grafana/ {
        if ($ssl_client_verify != SUCCESS) { return 403; }
        proxy_pass http://grafana/;
        proxy_set_header Host $host;
    }

    # Prometheus (только с mTLS)
    location /prometheus/ {
        if ($ssl_client_verify != SUCCESS) { return 403; }
        proxy_pass http://prometheus/;
        proxy_set_header Host $host;
    }

    # Заглушка
    location / {
        return 404;
    }
}
