# VLESS+REALITY+Vision server config — standalone Xray на VPS

inbound:
  protocol: vless
  port: 443
  settings:
    clients:
      - id: "${XRAY_VISION_UUID:-${XRAY_XHTTP_UUID}}"
        flow: "xtls-rprx-vision"
    decryption: none

  streamSettings:
    network: tcp
    security: reality
    realitySettings:
      show: false
      target: "www.microsoft.com:443"
      xver: 0
      serverNames:
        - www.microsoft.com
      privateKey: "${XRAY_VISION_PRIVATE_KEY:-${XRAY_XHTTP_PRIVATE_KEY}}"
      shortIds:
        - "${XRAY_VISION_SHORT_ID:-${XRAY_XHTTP_SHORT_ID}}"
