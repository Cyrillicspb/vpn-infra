# Hysteria2 client config — запускается через hysteria2.service (systemd)
# Порт SOCKS5 :1083 используется watchdog и tun2socks

server: "${HYSTERIA2_SERVER}:443"

tls:
  insecure: true

auth: "${HYSTERIA2_AUTH}"

obfs:
  type: salamander
  salamander:
    password: "${HYSTERIA2_OBFS_PASSWORD}"

quic:
  keepAlivePeriod: 20s

bandwidth:
  up: 50 mbps
  down: 200 mbps

socks5:
  listen: 127.0.0.1:1083

log:
  level: warn
