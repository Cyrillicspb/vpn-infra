# Hysteria2 client config — генерируется setup.sh из .env
# Путь на сервере: /etc/hysteria/config.yaml (systemd unit: hysteria2.service)
# TUN убран — watchdog использует tun2socks поверх SOCKS5 :1083

server: "${HYSTERIA2_SERVER}:443"

tls:
  insecure: true    # self-signed cert на сервере

auth: "${HYSTERIA2_AUTH}"

obfs:
  type: salamander
  salamander:
    password: "${HYSTERIA2_OBFS_PASSWORD}"

bandwidth:
  up: 50 mbps
  down: 200 mbps

quic:
  keepAlivePeriod: 20s

socks5:
  listen: 127.0.0.1:1083

log:
  level: warn
