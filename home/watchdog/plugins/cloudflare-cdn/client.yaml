# Cloudflare CDN стек — клиентская сторона (Workers вариант)
# Поток: tun2socks → xray-client-cdn (VLESS+WS+TLS) → CF Worker → VPS Xray WS :8080
#
# Требует в .env: CF_CDN_HOSTNAME, CF_CDN_UUID
# config-cdn.json генерируется setup.sh и deploy.sh из этих переменных

stack: cloudflare-cdn
socks_port: 1082
tun_interface: tun-cf-cdn
container: xray-client-cdn
