# VLESS+REALITY+XHTTP server config — standalone Xray на VPS

inbound:
  protocol: vless
  port: 2083
  settings:
    clients:
      - id: "${XRAY_XHTTP_UUID}"
        flow: ""    # ВАЖНО: flow пустой, vision несовместим с XHTTP
    decryption: none

  streamSettings:
    network: xhttp
    security: reality
    xhttpSettings:
      path: "/"
      password: "${XHTTP_CDN_PASSWORD}"
      mode: packet-up
    realitySettings:
      show: false
      target: "cdn.jsdelivr.net:443"
      xver: 0
      serverNames:
        - cdn.jsdelivr.net
      privateKey: "${XRAY_XHTTP_PRIVATE_KEY}"
      shortIds:
        - "${XRAY_XHTTP_SHORT_ID}"
