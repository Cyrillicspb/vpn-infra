# VLESS+REALITY server config — настраивается в 3x-ui на VPS
# Этот файл — справочник параметров для настройки в панели

inbound:
  protocol: vless
  port: 443
  settings:
    clients:
      - id: "${XRAY_UUID}"
        flow: xtls-rprx-vision
    decryption: none
    fallbacks:
      - dest: 8443  # Fallback на Nginx при неверном SNI

  streamSettings:
    network: tcp
    security: reality
    realitySettings:
      show: false
      dest: "microsoft.com:443"
      xver: 0
      serverNames:
        - microsoft.com
        - www.microsoft.com
      privateKey: "${XRAY_PRIVATE_KEY}"
      shortIds:
        - ""
