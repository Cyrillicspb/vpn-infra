# nginx/default.conf — домашний сервер
# Переопределяет стандартный /etc/nginx/conf.d/default.conf
# Порт 80 используется ТОЛЬКО для Docker healthcheck (internal, не снаружи)

server {
    listen 80 default_server;
    server_name _;

    # Docker healthcheck endpoint — всегда возвращает 200
    # Проверяет что nginx-процесс жив и принимает соединения
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Всё остальное — 404 (порт 80 не для клиентов)
    location / {
        return 404;
    }
}
