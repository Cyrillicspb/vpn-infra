# nginx/grafana.conf — домашний сервер
# Форвардит запросы VPN-клиентов (10.177.1.0/24) к Grafana на VPS через tier2
#
# Схема:
#   Клиент (AWG/WG) → 10.177.1.1:9000 → 10.177.2.1:9000 (VPS nginx) → Grafana
#
# Порт 9000 привязан только к VPN-интерфейсу (10.177.1.1)
# Снаружи (eth0, публичный IP) — не слушает

server {
    listen 10.177.1.1:9000;
    server_name _;

    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        "upgrade";
    proxy_read_timeout  300s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass http://10.177.2.1:9000/;
    }

    access_log  /var/log/nginx/grafana_access.log;
    error_log   /var/log/nginx/grafana_error.log warn;
}
