# nginx/grafana.conf — домашний сервер
# Grafana теперь на домашнем сервере (порт 3000)
#
# Схема:
#   Клиент (AWG/WG) → 10.177.1.1:3000 → localhost:3000 (Grafana docker, порт проброшен)
#
# Порт 3000 привязан только к VPN-интерфейсу (10.177.1.1)
# Снаружи (eth0, публичный IP) — не слушает

server {
    listen 10.177.1.1:3000;
    server_name _;

    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        "upgrade";
    proxy_read_timeout  300s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass http://localhost:3000/;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    access_log  /var/log/nginx/grafana_access.log;
    error_log   /var/log/nginx/grafana_error.log warn;
}
