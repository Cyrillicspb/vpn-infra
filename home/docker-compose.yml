# docker-compose.yml — домашний сервер
# Запуск: docker compose up -d
# Опциональные профили: --profile portainer --profile homepage --profile wg-easy
#
# Порядок старта при boot: docker.service (After=watchdog.service)
# Порядок зависимостей в compose: socket-proxy → telegram-bot
#
# Сеть: 172.20.0.0/24 (Docker bridge, watchdog принимает только из этой подсети)
# Альтернативная при конфликте с офисным VPN /8: 172.29.177.0/24 (задаётся в .env)

networks:
  vpn-net:
    name: vpn-net
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.20.0.0/24}
    driver_opts:
      com.docker.network.bridge.name: br-vpn

services:

  # ── Nginx — Grafana через VPN (10.177.1.1:3000 → localhost:3000) ────────────
  # Только VPN-клиенты (10.177.1.0/24) могут подключиться, снаружи порт закрыт
  # Запуск: всегда (restart: always), не зависит от других сервисов
  nginx:
    image: nginx:1.25.4-alpine
    container_name: nginx
    restart: always
    network_mode: host
    volumes:
      - ./nginx/grafana.conf:/etc/nginx/conf.d/grafana.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Docker socket proxy (безопасный доступ к Docker API) ────────────────────
  # Telegram-бот и Portainer не получают полный доступ к /var/run/docker.sock
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: socket-proxy
    restart: always
    environment:
      DISABLE_IPV6: 1
      CONTAINERS: 1
      SERVICES: 1
      NETWORKS: 1
      TASKS: 1
      INFO: 1
      VERSION: 1
      AUTH: 0
      SECRETS: 0
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      vpn-net:
        ipv4_address: 172.20.0.10
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Telegram-бот ─────────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
      network: host
    image: vpn-telegram-bot:latest
    container_name: telegram-bot
    restart: always
    env_file: .env
    environment:
      WATCHDOG_URL: "http://host.docker.internal:8080"
      DOCKER_HOST: "tcp://socket-proxy:2375"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./telegram-bot/data:/app/data
      - /etc/vpn-routes:/etc/vpn-routes:ro
    networks:
      vpn-net:
        ipv4_address: 172.20.0.11
    depends_on:
      socket-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/vpn_bot.db').close()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Xray-client (REALITY / REALITY+gRPC) — standby, SOCKS5 :1080 ───────────
  # Управляется watchdog-ом (выбор стека), всегда запущен
  xray-client:
    image: teddysun/xray:latest
    container_name: xray-client
    restart: always
    volumes:
      - ./xray/config-reality.json:/etc/xray/config.json:ro
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 1080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Xray-client-2 (gRPC REALITY, dest cdn.jsdelivr.net) — standby, SOCKS5 :1081
  xray-client-2:
    image: teddysun/xray:latest
    container_name: xray-client-2
    restart: always
    volumes:
      - ./xray/config-grpc.json:/etc/xray/config.json:ro
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 1081 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Xray-client-cdn (Cloudflare Workers CDN-стек) — standby, SOCKS5 :1082 ───
  # Подключается к Cloudflare Worker → VPS Xray VLESS+WS :8080
  # Worker URL задаётся через CF_CDN_HOSTNAME в .env → config-cdn.json
  xray-client-cdn:
    image: teddysun/xray:latest
    container_name: xray-client-cdn
    restart: always
    volumes:
      - ./xray/config-cdn.json:/etc/xray/config.json:ro
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 1082 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Prometheus — сбор метрик ─────────────────────────────────────────────────
  # Scrape: home node-exporter (host.docker.internal:9100), VPS (10.177.2.2:9100),
  #         watchdog (host.docker.internal:8080), alertmanager (alertmanager:9093)
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: always
    user: "65534:65534"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/watchdog-token:/etc/prometheus/watchdog-token:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
      - "--web.listen-address=0.0.0.0:9090"
      - "--web.external-url=http://localhost:9090"
      - "--web.enable-lifecycle"
    networks:
      vpn-net:
        ipv4_address: 172.20.0.30
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Alertmanager — маршрутизация алертов → Telegram ──────────────────────────
  # Webhook: host.docker.internal:8090/notify (telegram-bot alerts.py)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: always
    user: "65534:65534"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/watchdog-token:/etc/alertmanager/watchdog-token:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=0.0.0.0:9093"
    networks:
      vpn-net:
        ipv4_address: 172.20.0.31
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana — дашборды + Render API (watchdog /graph → PNG → Telegram) ────────
  # Доступна: VPN-клиенты через nginx http://10.177.1.1:3000 → 172.20.0.32:3000
  #           watchdog напрямую http://172.20.0.32:3000
  # Порт на хост не пробрасывается: nginx занимает 10.177.1.1:3000 на хосте
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: always
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: "http://10.177.1.1:3000"
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
      GF_SERVER_HTTP_PORT: "3000"
      GF_RENDERING_SERVER_URL: "http://grafana-renderer:8081/render"
      GF_RENDERING_CALLBACK_URL: "http://grafana:3000/"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_LOG_LEVEL: "warn"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      vpn-net:
        ipv4_address: 172.20.0.32
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana Image Renderer — рендеринг графиков в PNG ────────────────────────
  grafana-renderer:
    image: grafana/grafana-image-renderer:3.10.1
    container_name: grafana-renderer
    restart: always
    environment:
      ENABLE_METRICS: "true"
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8081"
    networks:
      vpn-net:
        ipv4_address: 172.20.0.33
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Node Exporter — метрики хоста для Prometheus ─────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: always
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - /:/host:ro,rslave
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Portainer (опционально: --profile portainer) ─────────────────────────────
  portainer:
    image: portainer/portainer-ce:2.20.2
    container_name: portainer
    restart: always
    profiles:
      - portainer
    command: --http-disabled
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      vpn-net:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:9443/api/system/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Homepage (опционально: --profile homepage) ───────────────────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:v0.8.13
    container_name: homepage
    restart: always
    profiles:
      - homepage
    ports:
      - "3000:3000"
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      vpn-net:
        ipv4_address: 172.20.0.21
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Amnezia WG Easy (опционально: --profile wg-easy, read-only мониторинг) ──
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:13
    container_name: wg-easy
    restart: always
    profiles:
      - wg-easy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: "1"
      net.ipv4.ip_forward: "1"
    environment:
      WG_HOST: ${WG_HOST}
      PASSWORD: ${WG_EASY_PASSWORD:-}
      WG_PORT: ${WG_AWG_PORT:-51820}
      WG_DEFAULT_ADDRESS: "10.177.1.x"
      WG_DEFAULT_DNS: "10.177.1.1"
      WG_MTU: ${WG_MTU:-1320}
      UI_TRAFFIC_STATS: "true"
    ports:
      - "51820:51820/udp"
      - "51821:51821"
    volumes:
      - ./amnezia-wg-easy:/etc/wireguard
    networks:
      vpn-net:
        ipv4_address: 172.20.0.22
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  portainer_data:
    name: portainer_data
  prometheus_data:
    name: prometheus_data
  alertmanager_data:
    name: alertmanager_data
  grafana_data:
    name: grafana_data
