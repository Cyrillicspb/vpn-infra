# cloudflared config — домашний сервер
# Туннель от домашнего сервера к Cloudflare CDN
# CF_TUNNEL_TOKEN устанавливается через переменную окружения

tunnel: ${CF_TUNNEL_ID}
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # Трафик через CDN → xray-client на локальный SOCKS5
  - service: socks5://127.0.0.1:1080

# Метрики (только локально)
metrics: 127.0.0.1:20241
