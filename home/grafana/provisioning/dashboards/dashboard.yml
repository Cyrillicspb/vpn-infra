apiVersion: 1

providers:
  - name: 'VPN Dashboards'
    orgId: 1
    folder: 'VPN Infrastructure'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

# Dashboards (uid → используется в /graph команде бота):
#   vpn-system   : /graph system  → CPU история
#   vpn-tunnel   : /graph tunnel  → RTT, стеки, failover
#   vpn-tunnel   : /graph speed   → скорость (panel 2)
#   vpn-clients  : /graph clients → пиры, трафик
