#!/usr/sbin/nft -f
# /etc/nftables-blocked-static.conf
#
# Атомарное обновление set blocked_static.
# Генерируется скриптом update-routes.py → применяется через `nft -f`.
#
# ВАЖНО: flush set + add element в одном файле = одна kernel-транзакция.
# Нет "окна утечки" между очисткой и заполнением (в отличие от flush+add отдельно).
#
# Применение:
#   nft -f /etc/nftables-blocked-static.conf
#
# Проверка:
#   nft list set inet vpn blocked_static | wc -l

# Очищаем только этот set (не весь ruleset)
flush set inet vpn blocked_static

# Добавляем элементы пачкой (один вызов = одна транзакция)
# update-routes.py генерирует этот блок из combined.cidr
# Формат: IP/PREFIX или IP для одиночных адресов
#
# Пример для тестирования:
# add element inet vpn blocked_static {
#     77.88.0.0/18,       # Yandex
#     178.154.128.0/17,   # Yandex
#     5.255.255.0/24,     # Yandex
# }
#
# Реальные данные вставляет update-routes.py.
# Пустой файл допустим — set остаётся пустым после flush.
