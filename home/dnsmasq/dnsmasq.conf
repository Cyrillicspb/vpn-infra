# dnsmasq.conf — VPN Infrastructure
# Домашний сервер — системный dnsmasq (не Docker)

# Слушаем только на loopback, VPN-интерфейсах и functional health bridge.
# 172.21.0.1 нужен для vpn-fh-lan namespace в gateway mode.
listen-address=127.0.0.1,10.177.1.1,10.177.3.1,172.21.0.1
# bind-dynamic: стартует без wg0/wg1, биндится когда интерфейс появляется
# (bind-interfaces упадёт если wg ещё не поднят при старте dnsmasq)
bind-dynamic

# Порт DNS
port=53

# НЕ используем /etc/resolv.conf как upstream (управляем сами)
no-resolv

# Upstream DNS серверы (резолвим через них)
# Яндекс DNS — работает из России напрямую (1.1.1.1/8.8.8.8 заблокированы ISP)
server=77.88.8.8
server=77.88.8.1

# ВАЖНО: не логировать DNS-запросы (privacy)
# log-queries — ОТКЛЮЧЕНО

# Не возвращать IPv6 (AAAA) записи клиентам.
# Тоннель AWG/WG — IPv4-only. Без этого браузер получает AAAA-адрес
# заблокированного сайта, пытается соединиться через нативный IPv6
# клиента (мимо тоннеля) и попадает на страницу блокировки ISP.
filter-AAAA

# Кэш
cache-size=10000

# Отдавать NXDOMAIN для негативных ответов
no-negcache

# Включаем дополнительные конфиги
conf-dir=/etc/dnsmasq.d/,*.conf

# nft set для динамических заблокированных адресов
# Каждый резолвинг заблокированного домена автоматически добавляет IP
# в nft set blocked_dynamic (timeout 24h).
# Синтаксис: nftset=/<domain>/4#<table-family>#<table-name>#<set-name>
#
# Поддомены покрываются автоматически: nftset=/youtube.com/... → *.youtube.com
#
# Директивы nftset= хранятся в /etc/dnsmasq.d/vpn-domains.conf
# и генерируются скриптом update-routes.py при обновлении баз.
#
# Формат (table: inet vpn, set: blocked_dynamic):
#   nftset=/youtube.com/4#inet#vpn#blocked_dynamic
#   nftset=/googlevideo.com/4#inet#vpn#blocked_dynamic

# DNS сервер домашнего сервера для клиентов
# (отдаётся в WireGuard конфигах как DNS = 10.177.1.1)

# Локальный домен
local=/vpn.local/
domain=vpn.local

# Upstream DNS для заблокированных доменов — резолв через VPS
# (генерируется в dnsmasq.d/vpn-force.conf скриптом update-routes.py)
# Пример: server=/youtube.com/10.177.2.2

# Прогрев DNS кэша при старте (выполняется scripts/dns-warmup.sh)
# В конфиге только базовые настройки, домены добавляются динамически
