# /etc/dnsmasq.d/vpn-domains.conf
# Генерируется автоматически скриптом update-routes.py
# НЕ РЕДАКТИРОВАТЬ ВРУЧНУЮ — изменения будут перезаписаны при обновлении баз
#
# Два типа директив для каждого домена:
#
#   server=/<domain>/<vps-dns>
#     → заблокированные домены резолвить через VPS DNS (10.177.2.2)
#     → обеспечивает правильный IP (не блокированный РКН)
#
#   nftset=/<domain>/4#inet#vpn#blocked_dynamic
#     → при резолве добавить IP в nft set blocked_dynamic (timeout 24h)
#     → трафик к этому IP получает fwmark 0x1 → идёт через tun (VPS)
#
# Поддомены покрываются автоматически:
#   nftset=/youtube.com/... → *.youtube.com тоже попадёт в set
#
# VPS_DNS = 10.177.2.2 (Tier-2 туннель, настраивается setup.sh)

# ── Видеосервисы ─────────────────────────────────────────────────────────────
server=/youtube.com/10.177.2.2
nftset=/youtube.com/4#inet#vpn#blocked_dynamic

server=/googlevideo.com/10.177.2.2
nftset=/googlevideo.com/4#inet#vpn#blocked_dynamic

server=/ggpht.com/10.177.2.2
nftset=/ggpht.com/4#inet#vpn#blocked_dynamic

server=/ytimg.com/10.177.2.2
nftset=/ytimg.com/4#inet#vpn#blocked_dynamic

